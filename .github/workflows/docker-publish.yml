name: Build and publish Needt

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: needt-production-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: teenxgrails/needt

jobs:
  gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint -- --max-warnings=0
      - run: npm run type-check
      - run: npm run test:unit -- --runInBand
      - run: npm run build
      - run: npm run build:worker

  publish:
    needs: gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    env:
      MIGRATION_HOOK: ${{ secrets.COOLIFY_MIGRATION_WEBHOOK_URL }}
      WORKER_HOOK: ${{ secrets.COOLIFY_WORKER_WEBHOOK_URL }}
      WEB_HOOK: ${{ secrets.COOLIFY_WEB_WEBHOOK_URL }}
      HEALTH_URL: ${{ secrets.NEEDT_PRODUCTION_HEALTH_URL }}
      ROLLBACK_HOOK: ${{ secrets.COOLIFY_ROLLBACK_WEBHOOK_URL }}
    steps:
      - name: Trigger migration job
        if: ${{ env.MIGRATION_HOOK != '' }}
        run: curl --fail --silent --show-error --retry 3 -X POST "$MIGRATION_HOOK?sha=${{ github.sha }}"
      - name: Trigger worker redeploy
        if: ${{ env.WORKER_HOOK != '' }}
        run: curl --fail --silent --show-error --retry 3 -X POST "$WORKER_HOOK?sha=${{ github.sha }}"
      - name: Trigger web redeploy
        if: ${{ env.WEB_HOOK != '' }}
        run: curl --fail --silent --show-error --retry 3 -X POST "$WEB_HOOK?sha=${{ github.sha }}"
      - name: Verify production health
        if: ${{ env.HEALTH_URL != '' }}
        run: curl --fail --silent --show-error --retry 12 --retry-delay 10 "$HEALTH_URL"
      - name: Roll back failed deployment
        if: ${{ failure() && env.ROLLBACK_HOOK != '' }}
        run: curl --fail --silent --show-error --retry 2 -X POST "$ROLLBACK_HOOK"
