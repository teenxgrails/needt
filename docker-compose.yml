services:
  app:
    image: ghcr.io/teenxgrails/needt:main
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Pin the container's bind address and port so unrelated PORT/HOSTNAME values
    # in the operator's .env cannot change them (env_file is overridden by
    # environment). The Next.js standalone server binds to HOSTNAME:PORT, so this
    # keeps the 3000:3000 publish pointed at a reachable, listening server.
    # See issue #151.
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=fluid
      - POSTGRES_PASSWORD=fluid
      - POSTGRES_DB=fluid_calendar
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluid -d fluid_calendar"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_dev_data:
